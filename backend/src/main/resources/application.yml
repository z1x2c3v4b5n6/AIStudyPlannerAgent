spring:
  application:
    name: ai-study-planner-agent
  config:
    import: optional:file:./application-local.yml
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_study_planner?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia%2FShanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  ai:
    model:
      chat: none
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: 1800
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

app:
  cors:
    allowed-origin: ${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
  ai:
    enabled: ${AI_ENABLED:false}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    completions-path: ${DEEPSEEK_COMPLETIONS_PATH:/chat/completions}
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    temperature: ${DEEPSEEK_TEMPERATURE:0.2}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:2500}
    timeout-seconds: ${DEEPSEEK_TIMEOUT_SECONDS:45}
